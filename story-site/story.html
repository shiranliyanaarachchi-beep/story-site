<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Story</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body data-page="story">
  <div class="container">
    <div class="nav">
      <div class="brand">
        <div class="logo"></div>
        <div>
          My Story World
          <small>Story page</small>
        </div>
      </div>
      <div class="actions">
        <button id="themeBtn" class="btn">🌙 Dark</button>
        <a class="btn" href="index.html">← Home</a>
      </div>
    </div>

    <div class="story-wrap">
      <div class="story-header">
        <h1 id="stTitle">Loading…</h1>
        <div class="sub">
          <span id="stMeta"></span>
          <span id="stTags"></span>
        </div>

        <div class="story-actions">
          <button id="likeBtn" class="like" type="button">
            <span class="heart">❤️</span>
            <span class="label">Like</span>
          </button>
        </div>

        <img id="stCover" class="story-cover" src="" alt="" />
      </div>

      <div id="stContent" class="story-content"></div>

      <hr class="sep" />

      <h2>Comments</h2>
      <p class="notice">
        Comments are free and stored in GitHub Discussions (Giscus). People can comment without you running a server.
      </p>

      <!-- Giscus host: app.js sets data-term per story -->
      <div id="giscusHost"
        data-repo="YOUR_GITHUB_USERNAME/YOUR_REPO_NAME"
        data-repo-id="YOUR_REPO_ID"
        data-category="General"
        data-category-id="YOUR_CATEGORY_ID"
        data-mapping="specific"
        data-term="loading"
        data-strict="1"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="preferred_color_scheme"
        data-lang="en"
        crossorigin="anonymous">
      </div>

      <script src="https://giscus.app/client.js" async></script>

      <a class="backlink" href="index.html">← Back to all stories</a>
    </div>

    <div class="footer">
      <p>© <span id="year"></span> My Story World</p>
    </div>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
  <script src="app.js"></script>
</body>
</html>
